<style>
  :root {
    color-scheme: dark only;
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1c1c1c;
    --border: #262626;
    --text: #f5f5f5;
    --muted: #888;
    --dim: #555;
    --accent: #ff3b30;
    --accent-glow: rgba(255, 59, 48, 0.15);
    --green: #30d158;
    --yellow: #ffd60a;
  }

  /* Force dark theme everywhere, override OS light mode */
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1c1c1c;
      --border: #262626;
      --text: #f5f5f5;
      --muted: #888;
      --dim: #555;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html {
    background: #0a0a0a !important;
    color-scheme: dark;
  }

  html, body {
    background: var(--bg) !important;
    color: var(--text) !important;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    min-height: 100vh;
    min-height: 100dvh;
  }

  body {
    background:
      radial-gradient(ellipse at top, rgba(255,59,48,0.05) 0%, transparent 50%),
      var(--bg) !important;
  }

  input, textarea, button { color-scheme: dark; }

  /* === HEADER === */
  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 100;
  }

  .brand-block {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .brand-photo {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center 20%;
    border: 3px solid var(--accent);
    box-shadow: 0 0 40px var(--accent-glow), 0 0 80px rgba(255,59,48,0.08);
    flex-shrink: 0;
  }

  .brand-text {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 0.05em;
    line-height: 0.95;
    color: var(--text);
  }

  .brand .accent { color: var(--accent); }

  .brand-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .header-meta {
    display: flex;
    gap: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .header-meta strong {
    color: var(--text);
    font-weight: 700;
  }

  /* === SESSION TABS === */
  .tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .tab {
    background: var(--bg);
    padding: 24px 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    border: none;
    color: var(--text);
    font-family: inherit;
    position: relative;
    overflow: hidden;
  }

  .tab::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  .tab:hover { background: var(--surface); }
  .tab.active { background: var(--surface); }
  .tab.active::before { transform: scaleX(1); }

  .tab-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.15em;
    display: block;
    margin-bottom: 8px;
  }

  .tab-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.05em;
    line-height: 1;
    color: var(--text);
  }

  .tab-stat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  /* === MAIN === */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 32px 120px;
  }

  .session-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .session-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    letter-spacing: 0.02em;
    line-height: 0.9;
    color: var(--text);
  }

  .session-title .accent { color: var(--accent); }

  .session-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
    -webkit-appearance: none;
    appearance: none;
  }

  .btn:hover { border-color: var(--text); background: var(--surface); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .btn-primary:hover {
    background: #ff5147;
    border-color: #ff5147;
    box-shadow: 0 0 24px var(--accent-glow);
  }

  .btn-ghost {
    border: none;
    padding: 6px 10px;
    color: var(--muted);
    background: transparent;
  }

  .btn-ghost:hover { color: var(--text); background: transparent; }

  /* === EXERCISE LIST === */
  .exercises {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .exercise {
    background: var(--surface);
    transition: background 0.15s ease;
  }

  .exercise-row {
    display: grid;
    grid-template-columns: 50px 1fr auto auto auto;
    align-items: center;
    padding: 18px 24px;
    gap: 20px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .exercise-row:hover { background: var(--surface-2); }

  .ex-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--dim);
    letter-spacing: 0.05em;
  }

  .ex-name {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .ex-recent {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }

  .ex-recent .val { color: var(--text); font-weight: 600; }

  .ex-pr {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--yellow);
    text-align: right;
    padding: 4px 8px;
    border: 1px solid rgba(255,214,10,0.2);
    background: rgba(255,214,10,0.05);
    letter-spacing: 0.05em;
  }

  .ex-pr.empty { visibility: hidden; }

  .ex-chevron {
    color: var(--dim);
    transition: transform 0.2s ease;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
  }

  .exercise.open .ex-chevron { transform: rotate(90deg); color: var(--accent); }
  .exercise.open { background: var(--surface-2); }

  /* === EXPANDED DETAIL === */
  .exercise-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 24px;
    background: #0d0d0d;
  }

  .exercise.open .exercise-detail { display: grid; }

  .exercise-detail {
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }

  @media (max-width: 900px) {
    .exercise-detail { grid-template-columns: 1fr; }
  }

  .detail-section h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .detail-section h3::before {
    content: '';
    width: 4px; height: 4px;
    background: var(--accent);
    display: inline-block;
  }

  /* === VIDEO CARD === */
  .video-card {
    display: block;
    background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
    border: 1px solid var(--border);
    padding: 28px 24px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .video-card:hover {
    border-color: var(--accent);
    background: linear-gradient(135deg, #222 0%, #111 100%);
    transform: translateY(-1px);
  }

  .video-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(circle at top right, var(--accent-glow), transparent 50%);
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
  }

  .video-card:hover::before { opacity: 1; }

  .video-card-inner {
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  .play-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 32px var(--accent-glow);
    flex-shrink: 0;
  }

  .play-icon::before {
    content: '';
    width: 0; height: 0;
    border-left: 14px solid white;
    border-top: 9px solid transparent;
    border-bottom: 9px solid transparent;
    margin-left: 4px;
  }

  .video-card-text {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 0;
  }

  .video-card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.04em;
    line-height: 1.1;
  }

  .video-card-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .video-card-arrow {
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    transition: transform 0.2s ease, color 0.2s ease;
  }

  .video-card:hover .video-card-arrow {
    color: var(--accent);
    transform: translate(2px, -2px);
  }

  /* === LOG FORM === */
  .log-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .set-row {
    display: grid;
    grid-template-columns: 50px 1fr 1fr 40px;
    gap: 8px;
    align-items: center;
  }

  .set-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    width: 100%;
    transition: all 0.15s;
    -webkit-appearance: none;
    appearance: none;
    border-radius: 0;
  }

  .input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface);
  }

  .input::placeholder { color: var(--dim); }

  .remove-set {
    background: transparent;
    border: none;
    color: var(--dim);
    cursor: pointer;
    font-size: 20px;
    padding: 4px;
    transition: color 0.15s;
  }

  .remove-set:hover { color: var(--accent); }

  .form-actions {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    gap: 8px;
  }

  /* === HISTORY === */
  .history {
    margin-top: 24px;
    grid-column: 1 / -1;
    border-top: 1px solid var(--border);
    padding-top: 24px;
  }

  .history-entries {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 280px;
    overflow-y: auto;
  }

  .history-entries::-webkit-scrollbar { width: 6px; }
  .history-entries::-webkit-scrollbar-track { background: transparent; }
  .history-entries::-webkit-scrollbar-thumb { background: var(--border); }

  .history-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--surface);
    border-left: 2px solid var(--border);
    transition: border-color 0.15s;
    gap: 12px;
  }

  .history-entry:hover { border-left-color: var(--accent); }

  .history-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .history-sets {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
    flex: 1;
  }

  .set-pill {
    background: var(--bg);
    padding: 3px 8px;
    border: 1px solid var(--border);
    color: var(--text);
  }

  .set-pill.pr {
    background: rgba(255,214,10,0.05);
    border-color: rgba(255,214,10,0.3);
    color: var(--yellow);
  }

  .history-delete {
    background: transparent;
    border: none;
    color: var(--dim);
    cursor: pointer;
    padding: 4px 8px;
    font-size: 16px;
    flex-shrink: 0;
  }

  .history-delete:hover { color: var(--accent); }

  .empty-history {
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 16px;
    text-align: center;
    border: 1px dashed var(--border);
  }

  /* === FOOTER UTILITY === */
  .util-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 12px 32px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    z-index: 50;
  }

  .util-bar a, .util-bar button {
    color: var(--muted);
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    margin-left: 16px;
    transition: color 0.15s;
  }

  .util-bar a:hover, .util-bar button:hover { color: var(--text); }

  /* === MODAL === */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    max-width: 600px;
    width: 100%;
    padding: 32px;
    max-height: 80vh;
    overflow-y: auto;
    color: var(--text);
  }

  .modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 0.05em;
    margin-bottom: 24px;
    color: var(--text);
  }

  .modal pre {
    background: var(--bg);
    padding: 16px;
    border: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    overflow-x: auto;
    max-height: 300px;
    overflow-y: auto;
  }

  /* === MOBILE === */
  @media (max-width: 768px) {
    header {
      padding: 18px 16px;
      gap: 12px;
    }
    .brand-block { gap: 16px; }
    .brand-photo { width: 72px; height: 72px; border-width: 2px; }
    .brand { font-size: 28px; letter-spacing: 0.04em; }
    .brand-sub { font-size: 9px; }
    .header-meta { display: none; }
    .tabs { grid-template-columns: repeat(2, 1fr); }
    .tab { padding: 16px 14px; }
    .tab-name { font-size: 18px; }
    .tab-stat { font-size: 9px; margin-top: 6px; }
    .tab-num { font-size: 9px; margin-bottom: 6px; }
    main { padding: 24px 16px 100px; }
    .session-title { font-size: 42px; }
    .session-actions .btn { padding: 8px 12px; font-size: 10px; }
    .exercise-row {
      grid-template-columns: 30px 1fr auto;
      padding: 14px 16px;
      gap: 12px;
    }
    .ex-recent, .ex-pr { display: none; }
    .ex-num { font-size: 20px; }
    .ex-name { font-size: 14px; }
    .exercise-detail { padding: 16px; gap: 24px; }
    .set-row { grid-template-columns: 40px 1fr 1fr 32px; }
    .util-bar { padding: 10px 16px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); font-size: 9px; }
    .util-bar > div:first-child { display: none; }
    .util-bar > div:last-child { flex: 1; display: flex; justify-content: space-around; }
    .util-bar button { margin-left: 0; }
    .video-card { padding: 20px 16px; }
    .video-card-title { font-size: 16px; }
    .play-icon { width: 44px; height: 44px; }
    .play-icon::before {

<script>
// === DATA ===
const SESSIONS = [
  {
    id: 'lower_hamstring',
    name: 'Lower Hamstring',
    exercises: [
      { name: 'Dumbbell Deadlifts',        starting: '3x Reps',     yt: 'dumbbell deadlift proper form tutorial' },
      { name: 'Hamstring Curls',           starting: '3x Reps',     yt: 'lying hamstring curl machine form' },
      { name: 'Reverse Dumbbell Lunges',   starting: '3x Reps',     yt: 'reverse dumbbell lunge form' },
      { name: '45 deg Leg Press (Wide)',   starting: '3x Reps',    yt: '45 degree leg press wide stance form' },
      { name: 'Adductor Machine',          starting: '3x Reps',    yt: 'hip adductor machine exercise form' },
      { name: 'Seated Calf Raise',         starting: '3x Reps',    yt: 'seated calf raise machine form' },
      { name: 'Hanging Knee Raises',       starting: '3x Reps',  yt: 'hanging knee raises proper form' },
      { name: 'Decline Crunches',          starting: '3x Reps',  yt: 'decline bench crunches form' },
    ]
  },
  {
    id: 'lower_quads',
    name: 'Lower Quads',
    exercises: [
      { name: 'Bulgarian Split Squats',         starting: '3x Reps',    yt: 'bulgarian split squat dumbbell form' },
      { name: '45 deg Leg Press (Shoulder)',    starting: '3x Reps',   yt: '45 degree leg press narrow stance form' },
      { name: 'Seated Leg Curl (Hammy)',        starting: '3x Reps',    yt: 'seated leg curl machine proper form' },
      { name: 'Dumbbell Walking Lunges',        starting: '3x Reps',   yt: 'dumbbell walking lunges form tutorial' },
      { name: 'Leg Extension (Knee)',           starting: '3x Reps',   yt: 'leg extension machine proper form' },
      { name: 'Wall Calf Raises',               starting: '3x Reps', yt: 'standing calf raise bodyweight form' },
      { name: 'Cable Crunches Abs',             starting: '3x Reps', yt: 'cable crunches abs proper form' },
      { name: 'Reverse Crunches',               starting: '3x Reps', yt: 'reverse crunches abs form' },
    ]
  },
  {
    id: 'upper_pull',
    name: 'Upper Pull',
    exercises: [
      { name: 'Standing Shoulder Press',   starting: '3x Reps',   yt: 'standing dumbbell shoulder press form' },
      { name: 'Chin Ups',                  starting: '3x Reps', yt: 'chin ups proper form tutorial' },
      { name: 'Incline Dumbbell Press',    starting: '3x Reps',    yt: 'incline dumbbell press form' },
      { name: 'Seated Cable Rows',         starting: '3x Reps',    yt: 'seated cable row proper form' },
      { name: 'Standing Barbell Curls',    starting: '3x Reps',    yt: 'standing barbell curl proper form' },
      { name: 'Seated Hammer Curls',       starting: '3x Reps',    yt: 'seated dumbbell hammer curl form' },
      { name: 'Cable Rear Delt Rows',      starting: '3x Reps', yt: 'cable rear delt row form' },
      { name: 'Dumbbell Shrugs',           starting: '3x Reps',   yt: 'dumbbell shrugs proper form' },
    ]
  },
  {
    id: 'upper_push',
    name: 'Upper Push',
    exercises: [
      { name: 'Barbell Bench Press',          starting: '3x Reps',   yt: 'barbell bench press proper form' },
      { name: 'Single Arm Rows',              starting: '3x Reps',   yt: 'single arm dumbbell row form' },
      { name: 'Incline Dumbbell Press',       starting: '3x Reps',   yt: 'incline dumbbell press form tutorial' },
      { name: 'Wide Grip Lat Pulldown',       starting: '3x Reps',   yt: 'wide grip lat pulldown proper form' },
      { name: 'Standing Dumbbell Lat Raises', starting: '3x Reps',  yt: 'dumbbell lateral raises proper form' },
      { name: 'Cable Crossovers (Chest)',     starting: '3x Reps',   yt: 'cable crossover chest form' },
      { name: 'Tricep Skullcrushers',         starting: '3x Reps',  yt: 'tricep skullcrushers barbell form' },
      { name: 'Tricep Extension',             starting: '3x Reps',  yt: 'overhead tricep extension rope form' },
    ]
  }
];

// === STATE ===
const STORAGE_KEY = 'trainingLog_v1';
let state = loadState();
let activeSessionIdx = parseInt(localStorage.getItem('activeSession') || '0');

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { history: {} };
  } catch (e) {
    return { history: {} };
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  updateHeaderStats();
}

function getHistory(exerciseKey) {
  return state.history[exerciseKey] || [];
}

function exerciseKey(sessionId, exerciseName) {
  return `${sessionId}::${exerciseName}`;
}

function ytSearchUrl(query) {
  return `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
}

// === RENDER ===
function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = SESSIONS.map((s, i) => {
    const sessionCount = s.exercises.reduce((acc, ex) => acc + getHistory(exerciseKey(s.id, ex.name)).length, 0);
    return `
      <button class="tab ${i === activeSessionIdx ? 'active' : ''}" onclick="switchSession(${i})">
        <span class="tab-num">SESSION ${String(i+1).padStart(2,'0')}</span>
        <span class="tab-name">${s.name}</span>
        <span class="tab-stat">${sessionCount} ENTRIES</span>
      </button>
    `;
  }).join('');
}

function renderSession() {
  const session = SESSIONS[activeSessionIdx];
  const nameParts = session.name.split(' ');
  document.getElementById('sessionTitle').innerHTML =
    `${nameParts[0]} <span class="accent">${nameParts.slice(1).join(' ')}</span>`;

  const container = document.getElementById('exercises');
  container.innerHTML = session.exercises.map((ex, i) => {
    const key = exerciseKey(session.id, ex.name);
    const history = getHistory(key);
    const recent = history.length > 0 ? history[history.length - 1] : null;
    const pr = findPR(history);

    let recentLabel = `<span class="val">${ex.starting}</span> <span style="color:var(--dim)">TARGET</span>`;
    if (recent) {
      const topSet = recent.sets[0];
      recentLabel = `<span class="val">${formatSet(topSet)}</span> <span style="color:var(--dim)">${timeAgo(recent.date)}</span>`;
    }

    const prLabel = pr ? `PR · ${formatSet(pr)}` : '';

    return `
      <div class="exercise" data-key="${key}" id="ex-${i}">
        <div class="exercise-row" onclick="toggleExercise(${i})">
          <div class="ex-num">${String(i+1).padStart(2,'0')}</div>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-recent">${recentLabel}</div>
          <div class="ex-pr ${pr ? '' : 'empty'}">${prLabel}</div>
          <div class="ex-chevron">›</div>
        </div>
        <div class="exercise-detail">
          <div class="detail-section">
            <h3>FORM DEMO</h3>
            <a class="video-card" href="${ytSearchUrl(ex.yt)}" target="_blank" rel="noopener noreferrer">
              <div class="video-card-inner">
                <div class="play-icon"></div>
                <div class="video-card-text">
                  <div class="video-card-title">${ex.name}</div>
                  <div class="video-card-sub">WATCH FORM DEMO ON YOUTUBE</div>
                </div>
                <div class="video-card-arrow">↗</div>
              </div>
            </a>
            <div style="margin-top: 12px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.05em;">
              OPENS YOUTUBE IN NEW TAB · PICK A DEMO THAT WORKS FOR YOU
            </div>
          </div>

          <div class="detail-section">
            <h3>LOG TODAY'S SETS</h3>
            <div class="log-form" id="form-${i}">
              ${renderSetRows(3)}
            </div>
            <div class="form-actions">
              <button class="btn btn-ghost" onclick="addSetRow(${i})">+ ADD SET</button>
              <button class="btn btn-primary" onclick="saveLog(${i})">SAVE WORKOUT</button>
            </div>
          </div>

          <div class="history">
            <h3 style="font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 12px;">
              HISTORY · ${history.length} ${history.length === 1 ? 'ENTRY' : 'ENTRIES'}
            </h3>
            <div class="history-entries" id="history-${i}">
              ${renderHistory(history, key)}
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderSetRows(n) {
  return Array.from({ length: n }, (_, i) => `
    <div class="set-row">
      <div class="set-label">SET ${i+1}</div>
      <input type="text" class="input weight-input" placeholder="weight (kg)" inputmode="decimal" />
      <input type="text" class="input reps-input" placeholder="reps" inputmode="numeric" />
      <button class="remove-set" onclick="this.parentElement.remove()" title="Remove set">×</button>
    </div>
  `).join('');
}

function renderHistory(history, key) {
  if (history.length === 0) {
    return `<div class="empty-history">NO ENTRIES YET · LOG YOUR FIRST SET ABOVE</div>`;
  }
  const sorted = [...history].sort((a,b) => new Date(b.date) - new Date(a.date));
  const pr = findPR(history);
  return sorted.map(entry => {
    const setsHtml = entry.sets.map(s => {
      const isPR = pr && s.weight == pr.weight && s.reps == pr.reps;
      return `<span class="set-pill ${isPR ? 'pr' : ''}">${formatSet(s)}</span>`;
    }).join('');
    return `
      <div class="history-entry">
        <div class="history-date">${formatDate(entry.date)}</div>
        <div class="history-sets">${setsHtml}</div>
        <button class="history-delete" onclick="deleteEntry('${key}', '${entry.date}')" title="Delete">×</button>
      </div>
    `;
  }).join('');
}

// === HELPERS ===
function formatSet(s) {
  if (!s) return '—';
  const w = s.weight;
  const r = s.reps;
  if (!w && r) return `${r} reps`;
  if (w && r) return `${w}kg × ${r}`;
  return '—';
}

function formatDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const opts = { month: 'short', day: 'numeric' };
  if (d.getFullYear() !== now.getFullYear()) opts.year = 'numeric';
  return d.toLocaleDateString('en-US', opts).toUpperCase();
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'TODAY';
  if (days === 1) return '1D AGO';
  if (days < 7) return `${days}D AGO`;
  if (days < 30) return `${Math.floor(days/7)}W AGO`;
  return `${Math.floor(days/30)}MO AGO`;
}

function findPR(history) {
  let best = null;
  history.forEach(entry => {
    entry.sets.forEach(s => {
      if (!s.weight || !s.reps) return;
      const e1rm = s.weight * (1 + s.reps / 30);
      if (!best || best._e1rm < e1rm) {
        best = { ...s, _e1rm: e1rm };
      }
    });
  });
  return best;
}

// === ACTIONS ===
function switchSession(i) {
  activeSessionIdx = i;
  localStorage.setItem('activeSession', i);
  renderTabs();
  renderSession();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleExercise(i) {
  const el = document.getElementById(`ex-${i}`);
  el.classList.toggle('open');
}

function collapseAll() {
  document.querySelectorAll('.exercise.open').forEach(el => el.classList.remove('open'));
}

function addSetRow(i) {
  const form = document.getElementById(`form-${i}`);
  const current = form.querySelectorAll('.set-row').length;
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="set-row">
      <div class="set-label">SET ${current+1}</div>
      <input type="text" class="input weight-input" placeholder="weight (kg)" inputmode="decimal" />
      <input type="text" class="input reps-input" placeholder="reps" inputmode="numeric" />
      <button class="remove-set" onclick="this.parentElement.remove()" title="Remove set">×</button>
    </div>
  `;
  form.appendChild(div.firstElementChild);
}

function saveLog(i) {
  const session = SESSIONS[activeSessionIdx];
  const exercise = session.exercises[i];
  const key = exerciseKey(session.id, exercise.name);

  const form = document.getElementById(`form-${i}`);
  const rows = form.querySelectorAll('.set-row');
  const sets = [];
  rows.forEach(row => {
    const w = parseFloat(row.querySelector('.weight-input').value) || null;
    const r = parseInt(row.querySelector('.reps-input').value) || null;
    if (w !== null || r !== null) {
      sets.push({ weight: w, reps: r });
    }
  });

  if (sets.length === 0) {
    flashMessage('Enter at least one set');
    return;
  }

  if (!state.history[key]) state.history[key] = [];
  state.history[key].push({
    date: new Date().toISOString(),
    sets
  });
  saveState();

  renderSession();
  renderTabs();
  setTimeout(() => {
    const el = document.getElementById(`ex-${i}`);
    if (el) {
      el.classList.add('open');
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 50);
}

function deleteEntry(key, date) {
  if (!confirm('Delete this entry?')) return;
  state.history[key] = (state.history[key] || []).filter(e => e.date !== date);
  if (state.history[key].length === 0) delete state.history[key];
  saveState();
  renderSession();
  renderTabs();
}

function flashMessage(msg) {
  const bar = document.createElement('div');
  bar.style.cssText = `
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: white; padding: 12px 24px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase;
    z-index: 300; box-shadow: 0 0 32px var(--accent-glow);
  `;
  bar.textContent = msg;
  document.body.appendChild(bar);
  setTimeout(() => bar.remove(), 2000);
}

// === HEADER STATS ===
function updateHeaderStats() {
  const allEntries = Object.values(state.history).flat();
  const total = allEntries.length;
  const totalEl = document.getElementById('totalLogged');
  if (totalEl) totalEl.textContent = total;

  const dates = new Set(allEntries.map(e => new Date(e.date).toDateString()));
  let streak = 0;
  let d = new Date();
  while (dates.has(d.toDateString())) {
    streak++;
    d.setDate(d.getDate() - 1);
  }
  const streakEl = document.getElementById('streak');
  if (streakEl) streakEl.textContent = streak + 'd';

  const today = new Date();
  const todayEl = document.getElementById('today');
  if (todayEl) {
    todayEl.innerHTML =
      today.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
  }
}

// === EXPORT / IMPORT / RESET ===
function exportData() {
  const data = JSON.stringify(state, null, 2);
  showModal('Export Data',
    `<p style="color: var(--muted); margin-bottom: 16px; font-size: 13px;">Copy this JSON and save it somewhere safe to back up your training history:</p>
     <pre id="exportPre">${escapeHtml(data)}</pre>
     <button class="btn" style="margin-top:12px" onclick="copyExport()">COPY TO CLIPBOARD</button>`);
}

function copyExport() {
  const text = document.getElementById('exportPre').textContent;
  navigator.clipboard.writeText(text).then(() => flashMessage('Copied'));
}

function importData() {
  showModal('Import Data',
    `<p style="color: var(--muted); margin-bottom: 16px; font-size: 13px;">Paste previously exported JSON below. This will REPLACE all current data.</p>
     <textarea id="importArea" class="input" style="min-height: 200px; resize: vertical; font-size: 11px;"></textarea>`,
    'IMPORT', () => {
      try {
        const txt = document.getElementById('importArea').value;
        const parsed = JSON.parse(txt);
        if (!parsed.history) throw new Error('Invalid format');
        state = parsed;
        saveState();
        renderSession();
        renderTabs();
        closeModal();
        flashMessage('Imported');
      } catch (e) {
        flashMessage('Invalid JSON');
      }
    });
}

function confirmReset() {
  showModal('Reset All Data',
    `<p style="color: var(--text); margin-bottom: 16px; font-size: 14px;">This will permanently delete all your training history. There is no undo.</p>
     <p style="color: var(--muted); font-size: 12px;">Consider exporting your data first.</p>`,
    'DELETE EVERYTHING', () => {
      state = { history: {} };
      saveState();
      renderSession();
      renderTabs();
      closeModal();
      flashMessage('Reset complete');
    });
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// === MODAL ===
function showModal(title, bodyHtml, actionLabel, actionFn) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  const actionBtn = document.getElementById('modalAction');
  if (actionLabel && actionFn) {
    actionBtn.style.display = '';
    actionBtn.textContent = actionLabel;
    actionBtn.onclick = actionFn;
  } else {
    actionBtn.style.display = 'none';
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

// === INIT ===
renderTabs();
renderSession();
updateHeaderStats();
</script>

</body>
</html>
